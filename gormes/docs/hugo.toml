baseURL = "https://docs.gormes.ai/"
languageCode = "en-us"
title = "Gormes Docs"

# URL structure: Hugo's default filename-based routing preserves
# nested section directories (e.g. /building-gormes/architecture_plan/phase-1-dashboard/).
# An explicit [permalinks] override with :slug would flatten nested
# sections into the parent — the test suite asserts the non-flat
# structure, so no override is used here.

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false
  [markup.highlight]
    style = "github-dark"
    lineNos = false
    noClasses = false

[outputs]
  home = ["HTML"]
  section = ["HTML"]
  page = ["HTML"]
